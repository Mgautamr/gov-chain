<!DOCTYPE html>
<html>
<head>
    <title>GovChain</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f5f5f5;
        }
        input {
            padding: 8px;
            margin: 5px;
        }
        button {
            padding: 8px 15px;
            cursor: pointer;
        }
        #result {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h1>GovChain System</h1>

<button onclick="register()">Register User</button>

<h3>Add Document</h3>
<input type="text" id="docHash" placeholder="Enter document hash">
<button onclick="addDocument()">Add</button>

<h3>Verify Document</h3>
<input type="text" id="verifyHash" placeholder="Enter hash">
<button onclick="verify()">Verify</button>

<p id="result">Waiting...</p>

<script>
const baseURL = "http://localhost:3000";

function setResult(msg) {
    document.getElementById("result").innerText = msg;
}

async function register() {
    try {
        setResult("Registering...");
        const res = await fetch(`${baseURL}/register`, { method: "POST" });
        const data = await res.text();
        setResult(data);
    } catch (err) {
        setResult("Error: " + err.message);
    }
}

async function addDocument() {
    const hash = document.getElementById("docHash").value;

    try {
        setResult("Adding document...");
        const res = await fetch(`${baseURL}/add-document`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ hash })
        });

        const data = await res.text();
        setResult(data);
    } catch (err) {
        setResult("Error: " + err.message);
    }
}

async function verify() {
    const hash = document.getElementById("verifyHash").value;

    try {
        setResult("Verifying...");
        const res = await fetch(`${baseURL}/verify/${hash}`);
        const data = await res.text();

        setResult(data === "true" ? "✅ Verified" : "❌ Not Found");
    } catch (err) {
        setResult("Error: " + err.message);
    }
}
</script>

</body>
</html>
